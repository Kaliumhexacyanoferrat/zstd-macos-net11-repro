name: Repro

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  repro:

    name: ${{ matrix.os.name }} / ${{ matrix.tfm }}

    runs-on: ${{ matrix.os.runs-on }}

    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        os:
          - name: linux-x64
            runs-on: ubuntu-latest

          - name: windows-x64
            runs-on: windows-latest

          - name: macos-arm64
            runs-on: macos-latest

        tfm: [ net10.0, net11.0 ]

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Run repro
        working-directory: src
        run: dotnet run -c Release -f ${{ matrix.tfm }}
